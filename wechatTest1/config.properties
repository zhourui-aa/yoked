#
# 如何获取 API Key 和 API Host：
#   1. 访问 https://console.qweather.com/
#   2. 注册账号并登录
#   3. 控制台 → 项目管理 → 创建项目（选择免费订阅）
#   4. 复制 API Key 填到下方
#   5. 控制台 → 设置 → 复制你的专属 API Host 填到下方
#      （格式类似：xxxxx.xxx.qweatherapi.com）
#
# 注意：2026 年起旧共享域名已停止服务，必须使用专属 Host。
# 城市搜索使用免费的 Open-Meteo API，无需额外配置。
#
# ============================================

