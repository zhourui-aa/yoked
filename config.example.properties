# ============================================
# 项目全局配置文件（模板）
# ============================================
# 复制此文件为 config.properties 并填入你的 API Key：
#   cp config.example.properties config.properties
#
# 或者用环境变量（更安全，不会误提交到 Git）：
#   ARK_API_KEY          火山引擎生图
#   ARK_VISION_API_KEY   火山引擎识图
#   DEEPSEEK_API_KEY     DeepSeek AI 对话
#   QWEATHER_API_KEY     和风天气
#   QWEATHER_API_HOST    和风天气 Host
# ============================================

# ---- DeepSeek AI（必需）----
# 获取：https://platform.deepseek.com/api_keys
deepseek.api.key=

# ---- 和风天气（可选）----
# 获取：https://console.qweather.com/
qweather.api.key=
qweather.api.host=

# ---- 火山引擎 Ark / 豆包 Seedream 生图（可选）----
# 获取：https://console.volcengine.com/ark/region:ark+cn-beijing/apikey
ark.api.key=

# ---- 火山引擎 Ark / 豆包 Seed 视觉理解（可选）----
ark.vision.api.key=
